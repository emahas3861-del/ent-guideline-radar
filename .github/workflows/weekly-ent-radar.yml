name: Weekly ENT Guideline Radar

on:
  schedule:
    # GitHub Actions uses UTC. This is Monday 08:00 in Asia/Shanghai.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run radar
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python -m src.main

      - name: Commit outputs and seen list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data outputs
          git diff --cached --quiet || git commit -m "Update weekly ENT radar output"
          git push
